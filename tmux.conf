# --- General Settings ---
unbind r 
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Set the prefix to `ctrl + space`
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

set -sa terminal-overrides ".xterm*:Tc"
set -g mouse on
set -g status-position top   

# DEFAULT SHELL: This ensures every new pane starts in Zsh
set -g default-shell /bin/zsh

# --- THE FIX FOR THE LONG TITLES ---
set-option -g allow-rename on 
set-window-option -g automatic-rename off

bind-key -n M-H previous-window
bind-key -n M-L next-window

# Binds backtick character to switch to marked pane with prefix + m
bind \` switch-client -t '{marked}'

# Better split pane keybindings
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
unbind '"'
unbind %

# Swap windows around 
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Set window and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g renumber-windows on

# Keep current path in newly created windows
bind c new-window -c "#{pane_current_path}"

# Pane Resizing: Prefix + Ctrl-h/j/k/l 
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Setup 'y' to yank (copy), just like Vim
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

#############################
########## Settings
#############################

set -g status-interval 5
set -g status-left-length 0
set -g status-right-length 150
set-option -g status "on"

# Default statusbar colors
set-option -g status-style bg=colour16,fg=colour255 
set-window-option -g window-status-style bg=colour214,fg=colour16 

set-option -g pane-active-border-style fg=colour128
set-option -g pane-border-style fg=colour255
set-option -g message-style bg=colour16,fg=colour207 

# --- STATUS LEFT: Session Bubble ---
set-option -g status-left "\
#[fg=colour7, bg=colour241]#{?client_prefix,#[bg=colour167],} ❐ #S \
#[fg=colour241, bg=colour16]#{?client_prefix,#[fg=colour167],}#{?window_zoomed_flag, 🔍,}"

set-option -g status-left ""
set-option -g status-right ""

# --- WINDOW FORMATS (Circular Bubbles) ---

# ACTIVE WINDOW: Uses  and  for a pill shape
set-window-option -g window-status-current-format "\
#[fg=colour27, bg=colour16]\
#[fg=colour255, bg=colour27] #I* \
#[fg=colour255, bg=colour27, bold]#W \
#[fg=colour27, bg=colour16]"

# INACTIVE WINDOW: Uses a darker bubble
set-window-option -g window-status-format "\
#[fg=colour239, bg=colour16]\
#[fg=colour255, bg=colour239]#I \
#[fg=colour255, bg=colour239]#W \
#[fg=colour239, bg=colour16]"

set-window-option -g window-status-current-style bg=colour27,fg=colour237

setw -g history-limit 50000000

# --- Vim Navigator Logic (Cleaned to fix unknown flag -s error) ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
